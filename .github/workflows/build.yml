name: Build Windows Executable

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Flet executable
        run: cmd /c flet pack main.py --name WindowsInspector --add-data "assets;assets"

      - name: Find built exe
        run: |
          Get-ChildItem -Filter "*.exe" -Recurse | Select-Object FullName, Length

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
          fail_on_unmatched_files: true

      - name: Create GitHub Release (auto)
        if: github.event_name != 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="build-$(date +%Y%m%d-%H%M%S)"
          gh release create "$VERSION" dist/*.exe --draft --prerelease 2>&1 || echo "Release creation skipped"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-inspector-exe
          path: |
            dist/*.exe
          retention-days: 30
