name: Build Windows Executable

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Flet executable
        run: cmd /c flet pack main.py --name WindowsInspector --add-data "assets;assets" --icon assets/icon.ico

      - name: Find built exe
        run: |
          Get-ChildItem -Filter "*.exe" -Recurse | Select-Object FullName, Length

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
          fail_on_unmatched_files: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-inspector-exe
          path: |
            dist/*.exe
          retention-days: 30
